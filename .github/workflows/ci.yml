name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [quality, docker-build]
    env:
      DATABASE_URL: postgres://queue_reminiscence:queue_reminiscence@localhost:5432/queue_reminiscence
      SESSION_SECRET: ci-session-secret-not-real
      TOKEN_SECRET: ci-token-secret-not-real
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Write .env
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=postgres://queue_reminiscence:queue_reminiscence@localhost:5432/queue_reminiscence
          SESSION_SECRET=ci-session-secret-not-real
          TOKEN_SECRET=ci-token-secret-not-real
          EOF

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U queue_reminiscence && break
            echo "Waiting for postgres... ($i)"
            sleep 1
          done

      - name: Run DB migrations
        run: bun run --cwd packages/db db:migrate

      - name: Start API
        run: docker compose up -d api

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3002/healthz && break
            echo "Waiting for API... ($i)"
            sleep 1
          done

      - name: Install Playwright browsers
        run: bun run e2e:install

      - name: Run E2E tests
        run: bun run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  publish:
    name: Publish unstable image
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Unstable channel: main builds. `:latest` is reserved for tagged
          # releases (see release.yml) so it always means "newest stable".
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:edge
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
