name: queue-reminiscence

services:
  postgres:
    image: postgres:16-alpine
    container_name: qr-postgres
    environment:
      POSTGRES_USER: queue_reminiscence
      POSTGRES_PASSWORD: queue_reminiscence
      POSTGRES_DB: queue_reminiscence
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue_reminiscence"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qr-api
    env_file: .env
    environment:
      # Override localhost DSN from .env with the Docker-internal hostname
      DATABASE_URL: postgres://queue_reminiscence:queue_reminiscence@qr-postgres:5432/queue_reminiscence
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations before starting the API server
    command: >
      sh -c 'bun run --cwd packages/db db:migrate && bun run apps/api/src/index.ts'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "const r=await fetch(''http://localhost:3002/healthz'');process.exit(r.ok?0:1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: qr-admin
    env_file: .env
    environment:
      # Browser-side API calls go via the published host port
      PUBLIC_API_BASE_URL: http://localhost:3002/api
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy

  display:
    build:
      context: .
      dockerfile: apps/public-web/Dockerfile
    container_name: qr-display
    env_file: .env
    environment:
      # Browser-side API calls go via the published host port
      PUBLIC_API_BASE_URL: http://localhost:3002/api
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
